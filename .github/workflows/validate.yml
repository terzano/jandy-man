name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    # Re-validate daily so changes in Home Assistant manifest requirements surface even without commits.
    - cron: "0 0 * * *"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
