name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    # Re-validate daily so changes in HA/HACS requirements surface even without commits.
    - cron: "0 0 * * *"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # This is a custom integration, not in the home-assistant/brands repo.
          ignore: brands
